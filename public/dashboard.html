<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
  <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=2">
  <title>Syntho | Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="bg-animation"></div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <h2 style="margin-top: 20px;">AI is composing...</h2>
    <p style="color: var(--text-secondary); margin-top: 10px;">Analyzing parameters & generating sequence</p>
  </div>

  <nav>
    <a href="index.html" class="logo">Syntho.ai</a>
    <div class="nav-links">
      <span id="user-display" style="font-weight:bold; margin-right:20px;"></span>
      <button id="logout-btn" class="btn btn-outline" style="padding: 5px 15px;">Logout</button>
    </div>
  </nav>

  <div class="dashboard-wrapper">
    <!-- Sidebar / Generation Controls -->
    <aside class="sidebar">
      <h3>Generation Settings</h3>
      <form id="generate-form">
        <div class="input-group">
          <label>Mood</label>
          <select id="mood" required>
            <option value="Happy">Happy</option>
            <option value="Relax">Relax / Calm</option>
            <option value="Workout">Workout / Energetic</option>
            <option value="Romantic">Romantic</option>
          </select>
        </div>
        
        <div class="input-group">
          <label>Genre</label>
          <select id="genre" required>
            <option value="Classical">Classical</option>
            <option value="Pop">Pop</option>
            <option value="Jazz">Jazz</option>
            <option value="EDM">EDM</option>
          </select>
        </div>

        <div class="input-group">
          <label>Activity</label>
          <select id="activity" required>
            <option value="Study">Study</option>
            <option value="Workout">Workout</option>
            <option value="Relax">Relax</option>
            <option value="Sleep">Sleep</option>
          </select>
        </div>



        <div class="input-group">
          <label>Language</label>
          <select id="language" required>
            <option value="">Any</option>
            <option value="Telugu">Telugu (Tollywood)</option>
            <option value="Hindi">Hindi (Bollywood)</option>
            <option value="Tamil">Tamil (Kollywood)</option>
            <option value="English">English</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top:20px;">
          <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Music
        </button>
      </form>

      <div class="history-section" style="margin-top: 20px;">
        <h3>Recent Tracks</h3>
        <ul class="history-list" id="history-list">
          <li class="history-item">
            <span><i class="fa-solid fa-music"></i> Create your first track</span>
          </li>
        </ul>
      </div>
    </aside>

    <!-- Main Content / Player view -->
    <main class="main-content">
      <div class="panel player-container">
        <h2 id="now-playing-title">Ready to Generate</h2>
        <p style="color:var(--text-secondary);" id="now-playing-meta">Select settings and click generate</p>
        
        <div class="visualizer" style="margin: 20px 0;">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>

        <div class="turntable" id="turntable">
          <i class="fa-solid fa-music" style="font-size: 2rem; color: #fff;"></i>
        </div>

        <div class="progress-container" style="margin-top: 30px;">
          <span id="current-time">0:00</span>
          <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <span id="duration-time">0:00</span>
        </div>

        <div class="controls" style="margin-top: 20px;">
          <button class="control-btn" id="stop-btn" title="Stop">
            <i class="fa-solid fa-stop"></i>
          </button>
          <button class="control-btn play-btn" id="play-pause-btn" title="Play/Pause">
            <i class="fa-solid fa-play"></i>
          </button>
        </div>

        <div class="input-group" style="width: 200px; display: flex; align-items:center; gap:10px; margin-top: 15px;">
           <i class="fa-solid fa-volume-high"></i>
           <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.8" style="width:100%;">
        </div>
      </div>
    </main>
  </div>

  <audio id="audio-player" style="display:none;"></audio>

  <div id="toast" class="toast">Message</div>
  
  <script src="js/app.js"></script>
  <script>
    // Security check - redirect if not logged in
    document.addEventListener("DOMContentLoaded", () => {
      const token = localStorage.getItem('token');
      if (!token) {
        window.location.href = "login.html";
      } else {
        const user = JSON.parse(localStorage.getItem('user'));
        if(user && user.username) {
          document.getElementById('user-display').innerText = "Hi, " + user.username;
        }
      }
    });
  </script>
</body>
</html>
