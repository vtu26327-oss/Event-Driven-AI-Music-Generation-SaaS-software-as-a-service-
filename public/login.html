<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
  <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=2">
  <title>Syntho | Auth</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-animation"></div>

  <nav>
    <a href="index.html" class="logo">Syntho.ai</a>
  </nav>

  <div class="auth-container">
    <div class="auth-card" id="login-card">
      <h2>Welcome Back</h2>
      <form id="login-form">
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" id="login-email" required placeholder="you@example.com">
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="login-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>
      <div class="toggle-auth">Don't have an account? <span id="to-signup">Sign up</span></div>
    </div>

    <div class="auth-card" id="signup-card" style="display: none;">
      <h2>Create Account</h2>
      <form id="signup-form">
        <div class="input-group">
          <label>Username</label>
          <input type="text" id="signup-user" required placeholder="creator123">
        </div>
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" id="signup-email" required placeholder="you@example.com">
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="signup-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>
      <div class="toggle-auth">Already have an account? <span id="to-login">Sign in</span></div>
    </div>
  </div>

  <div id="toast" class="toast">Message</div>
  
  <script src="js/app.js"></script>
  <script>
    document.getElementById('to-signup').addEventListener('click', () => {
      document.getElementById('login-card').style.display = 'none';
      document.getElementById('signup-card').style.display = 'block';
    });
    document.getElementById('to-login').addEventListener('click', () => {
      document.getElementById('signup-card').style.display = 'none';
      document.getElementById('login-card').style.display = 'block';
    });
  </script>
</body>
</html>
